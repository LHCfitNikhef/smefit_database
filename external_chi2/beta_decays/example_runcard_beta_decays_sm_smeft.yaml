coefficients:
  # ── Beta-decay parameters ──────────────────────────────────────────────────
  DRV:
    free: true
    prior:
      dist: uniform
      low: 0.01
      high: 0.04
  eta2:
    free: true
    prior:
      dist: uniform
      low: -3
      high: 3
  eta3:
    free: true
    prior:
      dist: uniform
      low: -3
      high: 3
  Vud:
    free: true
    prior:
      dist: uniform
      low: 0.9
      high: 1.0

  # ── SMEFT operators entering VnueduLL_1111 ─────────────────────────────────
  # Quark current
  O3pq:
    free: true
    prior:
      dist: uniform
      low: -10.0
      high: 10.0

  # Lepton currents — U(3)^3 symmetry: O3pl1 = O3pl2 = O3pl3 = O3pl
  O3pl1:
    free: false
    vars: [O3pl]
    expr: "O3pl"
  O3pl2:
    free: false
    vars: [O3pl]
    expr: "O3pl"
  O3pl3:
    free: false
    vars: [O3pl]
    expr: "O3pl"
  O3pl:
    free: true
    prior:
      dist: uniform
      low: -10.0
      high: 10.0

  # 2-lepton 2-quark operators — U(3)^3 symmetry: Oql13 = Oql23 = Oql33 = Oql3
  Oql13:
    free: false
    vars: [Oql3]
    expr: "Oql3"
  Oql23:
    free: false
    vars: [Oql3]
    expr: "Oql3"
  Oql33:
    free: false
    vars: [Oql3]
    expr: "Oql3"
  Oql3:
    free: true
    prior:
      dist: uniform
      low: -10.0
      high: 10.0

  # Four-lepton operators — U(3)^3 symmetry: Oll1221 = Oll1331 = Oll2332 = Ollprime
  Oll1221:
    free: false
    vars: [Ollprime]
    expr: "Ollprime"
  Oll1331:
    free: false
    vars: [Ollprime]
    expr: "Ollprime"
  Oll2332:
    free: false
    vars: [Ollprime]
    expr: "Ollprime"
  Ollprime:
    free: true
    prior:
      dist: uniform
      low: -10.0
      high: 10.0

external_chi2:
  BetaDecayChi2RGevolve:
    path: ./beta_decays.py
  GaussConstraintDRV:
    path: ./beta_decays_gaussian_nuisance.py
    central: 0.02471
    sigma: 0.00025
  GaussConstraintEta2:
    path: ./beta_decays_gaussian_nuisance.py
    central: 0.0
    sigma: 1.0
  GaussConstraintEta3:
    path: ./beta_decays_gaussian_nuisance.py
    central: 0.0
    sigma: 1.0
  GaussConstraintVud:
    path: ./beta_decays_gaussian_nuisance.py
    central: 0.973
    sigma: 0.000292

actions_:
- run_ultranest_fit
# - run_blackjax_fit
