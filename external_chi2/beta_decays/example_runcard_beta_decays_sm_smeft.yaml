# Runcard 3: SM + SMEFT fit — free parameters are Vud and the four SMEFT operators
# (O3pq, O3pl, Oql3, Ollprime) that feed into VnueduLL_1111 via RGE matching.
# L is computed at each sample via the linear Jacobian approximation:
#   L(c) ≈ L_SM + (dL/dc) · c_free
result_ID: beta_decays_sm_smeft

# Update before running
result_path: ../../fit_results
# path to common data
data_path: /Users/eliehammou/Software/smefit/smefit_database/commondata_projections_L0
# path to theory predictions
theory_path: /Users/eliehammou/Software/smefit/smefit_database/theory

# Covmat settings
use_theory_covmat: True
use_t0: True

use_quad: False
float64: True
store_raw: True

# Nested sampling — 5 free parameters
ultranest_settings:
  ReactiveNS_settings:
    vectorized: False
    ndraw_max: 500
  Run_settings:
    min_num_live_points: 500
    min_ess: 200
    frac_remain: 0.01

blackjax_settings:
  n_live: 500
  repeats: 3
  delete_fraction: 0.5
  log_precision: -2

# RGE settings for matching SMEFT operators to VnueduLL_1111 at 2 GeV
rge:
  init_scale: 10000.0
  obs_scale: dynamic
  smeft_accuracy: integrate
  yukawa: none
  adm_QCD: False

