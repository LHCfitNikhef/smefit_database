# absolute path where results are stored
result_path: ./results/
# path to common data
data_path: ./smefit_database/commondata_projections_L0
# path to theory tables, default same as data path
theory_path: ./smefit_database/theory
single_parameter_fits: true
# Covmat settings
use_theory_covmat: false
use_t0: true
# SMEFT Expansion Order
use_quad: false
float64: true
store_raw: false
# NS settings
nlive: 2000
lepsilon: 0.00001
frac_remain: 0.01
n_samples: 200000
# RGE settings
rge:
  init_scale: 250.0
  obs_scale: dynamic # float or "dynamic"
  smeft_accuracy: integrate # options: integrate, leadinglog
  yukawa: top # options: top, full or none
  adm_QCD: false # if true, the EW couplings are set to zero
  rg_matrix: ./rge_matrix_250.pkl
# Datasets to include
