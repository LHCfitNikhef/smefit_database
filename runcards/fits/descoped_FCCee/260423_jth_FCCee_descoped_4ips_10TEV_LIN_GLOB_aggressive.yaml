# path to data and theory
# path to common data
data_path: /Users/jaco/Documents/smefit_database/commondata_projections_descoped_fccee_4ips

# path to theory tables, default same as data path
theory_path: /Users/jaco/Documents/smefit_database/theory
# Covmat settings
use_theory_covmat: true
use_t0: true
# SMEFT Expansion Order
use_quad: false

rge:
  init_scale: 10000.0
  obs_scale: dynamic  # float or "dynamic"
  smeft_accuracy: integrate  # options: integrate, leadinglog
  yukawa: top  # options: top, full or none
  adm_QCD: false  # if true, the EW couplings are set to zero
  rg_matrix: /Users/jaco/Documents/physics_projects/new_smefit/results/260414_jth_rge_10tev/rge_matrix.pkl


